name: trackify
description: A production-grade expense tracking app with glassmorphism UI.
publish_to: 'none'
version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.68.0

  # Animations
  flutter_animate: ^4.5.0
  animations: ^2.0.11
  lottie: ^3.1.2

  # Notifications
  flutter_local_notifications: ^17.2.2

  # Background Tasks
  workmanager: ^0.9.0

  # Permissions
  permission_handler: ^11.3.1

  # SMS Reading (Android only)
  flutter_sms_inbox: ^1.0.4

  # File operations
  path_provider: ^2.1.3
  share_plus: ^9.0.0
  file_picker: ^8.0.3

  # Image
  image_picker: ^1.1.2

  # Biometric Auth
  local_auth: ^2.2.0

  # Typography
  google_fonts: ^6.2.1

  # Utilities
  uuid: ^4.4.0
  intl: ^0.19.0
  crypto: ^3.0.3

  # SVG
  flutter_svg: ^2.0.10+1

  # Sensors for parallax
  sensors_plus: ^5.0.1
  flutter_timezone: ^5.0.2
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
