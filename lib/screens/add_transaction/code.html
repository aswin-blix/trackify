<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Add Transaction</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#135bec",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101622",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased h-screen overflow-hidden flex flex-col">
<!-- Top Navigation Bar -->
<header class="flex items-center justify-between px-4 py-4 shrink-0">
<button class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined block">close</span>
</button>
<h1 class="text-lg font-semibold">Add Transaction</h1>
<button class="bg-primary hover:bg-primary/90 text-white px-4 py-2 rounded-lg font-medium transition-colors">
            Save
        </button>
</header>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col overflow-y-auto px-4 pb-4 space-y-6">
<!-- Transaction Type Switcher -->
<div class="flex p-1 bg-slate-200 dark:bg-slate-800 rounded-xl">
<button class="flex-1 py-2 text-sm font-semibold rounded-lg bg-white dark:bg-slate-700 shadow-sm text-primary">
                Expense
            </button>
<button class="flex-1 py-2 text-sm font-semibold rounded-lg text-slate-600 dark:text-slate-400">
                Income
            </button>
</div>
<!-- Amount Display -->
<div class="text-center py-6">
<span class="text-slate-500 dark:text-slate-400 text-lg block mb-1">Amount</span>
<div class="text-5xl font-bold tracking-tight flex justify-center items-center">
<span class="text-primary mr-1">$</span>
<input class="bg-transparent border-none text-center focus:ring-0 p-0 text-5xl font-bold w-auto inline-block max-w-full" readonly="" type="text" value="1,240.00"/>
</div>
</div>
<!-- Inputs Grid -->
<div class="grid grid-cols-1 gap-4">
<!-- Category Selector -->
<div class="flex items-center gap-3 bg-slate-100 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">category</span>
</div>
<div class="flex-1">
<label class="text-xs text-slate-500 dark:text-slate-400 block uppercase tracking-wider font-semibold">Category</label>
<select class="w-full bg-transparent border-none p-0 focus:ring-0 text-base font-medium appearance-none">
<option>Shopping</option>
<option>Food &amp; Drinks</option>
<option>Transportation</option>
<option>Entertainment</option>
</select>
</div>
<span class="material-symbols-outlined text-slate-400">expand_more</span>
</div>
<div class="grid grid-cols-2 gap-4">
<!-- Date Picker -->
<div class="flex items-center gap-3 bg-slate-100 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">calendar_today</span>
</div>
<div class="flex-1">
<label class="text-xs text-slate-500 dark:text-slate-400 block uppercase tracking-wider font-semibold">Date</label>
<input class="w-full bg-transparent border-none p-0 focus:ring-0 text-sm font-medium" type="text" value="Today, Oct 24"/>
</div>
</div>
<!-- Account/Wallet -->
<div class="flex items-center gap-3 bg-slate-100 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined">account_balance_wallet</span>
</div>
<div class="flex-1">
<label class="text-xs text-slate-500 dark:text-slate-400 block uppercase tracking-wider font-semibold">Account</label>
<select class="w-full bg-transparent border-none p-0 focus:ring-0 text-sm font-medium appearance-none">
<option>Main Bank</option>
<option>Credit Card</option>
<option>Cash</option>
</select>
</div>
</div>
</div>
<!-- Notes -->
<div class="flex items-start gap-3 bg-slate-100 dark:bg-slate-800/50 p-4 rounded-xl border border-slate-200 dark:border-slate-800">
<div class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-400 mt-1">
<span class="material-symbols-outlined">notes</span>
</div>
<div class="flex-1">
<label class="text-xs text-slate-500 dark:text-slate-400 block uppercase tracking-wider font-semibold">Notes</label>
<textarea class="w-full bg-transparent border-none p-0 focus:ring-0 text-sm font-medium resize-none" placeholder="Add details..." rows="1"></textarea>
</div>
</div>
</div>
</main>
<!-- Large Numpad for One-Handed Use -->
<div class="bg-white dark:bg-slate-900 border-t border-slate-200 dark:border-slate-800 p-2 pb-6 shrink-0 shadow-[0_-10px_30px_-15px_rgba(0,0,0,0.3)]">
<div class="grid grid-cols-3 gap-2 max-w-md mx-auto">
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">1</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">2</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">3</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">4</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">5</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">6</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">7</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">8</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">9</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">.</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">0</button>
<button class="h-16 flex items-center justify-center text-2xl font-semibold rounded-xl text-slate-400 hover:text-slate-600 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined">backspace</span>
</button>
</div>
</div>
</body></html>
